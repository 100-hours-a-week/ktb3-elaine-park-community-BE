version: '3.8'

services:
  db:
    image: postgres:15-alpine  # 가벼운 버전의 Postgres 사용
    container_name: my_fastapi_db
    ports:
      - "5432:5432"  # 내 컴퓨터 5432포트 <-> 도커 5432포트 연결
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data # 데이터를 도커 볼륨에 저장 (컨테이너 꺼도 데이터 유지됨)

volumes:
  postgres_data: